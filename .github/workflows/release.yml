name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # Gate publishing on the shared checks - never publish from a red main (#7).
  checks:
    uses: ./.github/workflows/checks.yml

  release:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          # OIDC trusted publishing needs npm >= 11.5.1. Node 24 bundles a new
          # enough npm, so we avoid an in-place `npm i -g npm@latest` self-
          # upgrade - that corrupts libnpmpublish's bundled `sigstore` dep and
          # breaks provenance with "Cannot find module 'sigstore'".
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Opens a "Version Packages" PR from accumulated changesets; when that PR
      # is merged, publishes the bumped packages to npm.
      #
      # Publishing uses OIDC trusted publishing - no NPM_TOKEN. Provenance is
      # generated automatically. Requires a Trusted Publisher configured per
      # package on npmjs.com (Package Settings -> Trusted Publisher) pointing at
      # examind-ai/calculator + this workflow. New packages must be published
      # once manually first, since a trusted publisher can't be set before the
      # package exists.
      - uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
